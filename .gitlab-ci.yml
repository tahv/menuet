# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

stages:
  - test
  - build
  - publish

# rules -----------------------------------------------------------------------

.code-patterns: &code-patterns
  - "src/**/*"
  - "tests/**/*"
  - ".gitlab-ci.yml"
  - "conftest.py"
  - "pyproject.toml"
  - "uv.lock"

.rule:code-merge-request-manual: &rule-code-merge-request-manual
  if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  changes: *code-patterns
  when: manual

.rule:code-default-branch-manual: &rule-code-default-branch-manual
  if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  changes: *code-patterns
  when: manual

.rule:default-branch-manual: &rule-default-branch-manual
  if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  when: manual

.rule:on-tag: &rule-on-tag
  if: '$CI_COMMIT_TAG'

# jobs ------------------------------------------------------------------------

# TOOD(tga): type checking (test)

lint:
  stage: test
  image: ghcr.io/astral-sh/ruff:alpine
  rules:
    - *rule-code-merge-request-manual
    - *rule-code-default-branch-manual
  dependencies: []
  interruptible: true
  allow_failure: true
  variables:
    FORCE_COLOR: 1
  script:
    - ruff check --output-format gitlab --output-file codequality.json --exit-zero
    - ruff check --output-format concise
  artifacts:
    when: always
    reports:
      codequality: codequality.json

format:
  stage: test
  rules:
    - *rule-code-merge-request-manual
    - *rule-code-default-branch-manual
  image: ghcr.io/astral-sh/ruff:alpine
  dependencies: []
  interruptible: true
  allow_failure: true
  variables:
    FORCE_COLOR: 1
  script:
    - ruff format --check --output-format gitlab > codequality.json || true
    - ruff format --check --output-format full
  artifacts:
    when: always
    reports:
      codequality: codequality.json

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.13"]
  rules:
    - *rule-code-merge-request-manual
    - *rule-code-default-branch-manual
  dependencies: []
  interruptible: true
  variables:
    FORCE_COLOR: 1
  before_script:
    # install linux qt dependencies
    - apt-get update
    - apt-get install -y
      libdbus-1-3 libegl1 libgl1 libglx-mesa0 libopengl0 libosmesa6 libpulse0
      libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0
      libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0
      libxcb-xinput0 libxkbcommon-x11-0 mesa-utils x11-utils x11-xserver-utils
      xvfb
    # congure linux headless display
    - export DISPLAY=":99.0"
    - start-stop-daemon --start --quiet --pidfile /tmp/xvfb.pid --make-pidfile --background
      --exec /usr/bin/Xvfb -- :99 -screen 0 1920x1200x24 -ac +extension GLX
  script:
    - uv sync --no-default-groups --group test --group bpy --extra copy --extra qt
    - uv run --no-sync -m coverage run --parallel -m pytest -vv --junitxml junit.xml
  artifacts:
    when: always
    paths: [".coverage.*"]
    reports:
      junit: junit.xml

coverage:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.14-alpine
  rules:
    - *rule-code-merge-request-manual
    - *rule-code-default-branch-manual
  needs: ["test"]
  interruptible: true
  allow_failure: true
  script:
    - uvx coverage combine
    - uvx coverage xml --fail-under=0
    - uvx coverage report
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

package:
  stage: build
  rules:
    - *rule-on-tag
    - <<: *rule-default-branch-manual
      needs: []
  image: ghcr.io/astral-sh/uv:python3.14-trixie
  interruptible: true
  variables:
    ATTEST_BUILD_ARTIFACTS: true # TODO(tga): experimental
  script: # derived from: https://github.com/hynek/build-and-inspect-python-package
    # the '.gitignore' litters the provenance attestation
    - uv build --clear --no-create-gitignore --out-dir dist
    - uvx check-wheel-contents dist/*.whl
    - uvx twine check --strict dist/*
  artifacts:
    paths: ["dist/"]

pypi:
  stage: publish
  rules:
    - *rule-on-tag
  image: ghcr.io/astral-sh/uv:alpine
  dependencies: [package]
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - apk update && apk add --no-cache curl jq
    - uv publish
    - RESPONSE=$( curl https://pypi.org/pypi/menuet/json )
    - echo "URL_SDIST=$( echo $RESPONSE | jq -r '.releases."$CI_COMMIT_TAG".[] | select(.packagetype=="sdist")'.url )" > pypi.env
    - echo "URL_WHEEL=$( echo $RESPONSE | jq -r '.releases."$CI_COMMIT_TAG".[] | select(.packagetype=="bdist_wheel")'.url )" > pypi.env
  artifacts:
    reports:
      dotenv: pypi.env

test-pypi:
  stage: publish
  rules:
    - *rule-default-branch-manual
  image: ghcr.io/astral-sh/uv:alpine
  dependencies: [package]
  id_tokens:
    TESTPYPI_ID_TOKEN:
      aud: testpypi
  variables:
    UV_PUBLISH_URL: https://test.pypi.org/legacy/
  script: uv publish

pages:
  stage: publish
  rules:
    - <<: *rule-on-tag
      needs: ["pypi"]
    - <<: *rule-default-branch-manual
      allow_failure: true
  needs: []
  image: ghcr.io/astral-sh/uv:python3.14-trixie
  variables:
    FORCE_COLOR: 1
  script:
    - uv sync --no-default-groups --group docs
    - uv run --no-sync -m zensical build --clean
  pages:
    publish: site

gitlab-release:
  stage: publish
  rules:
    - *rule-on-tag
  needs: ["pypi"]
  image: registry.gitlab.com/gitlab-org/cli:latest # alpine
  script:
    - apk update && apk add --no-cache git curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uvx hed --softbreak --tag "$CI_COMMIT_TAG" > RELEASE.md
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "$CI_COMMIT_TAG"
    description: "RELEASE.md"
    assets:
      links:
        - name: bdist_wheel
          link_type: package
          url: $URL_WHEEL
        - name: sdist
          link_type: package
          url: $URL_SDIST
